name: weatherglass

services:
  weatherglass:
    image: python:3.12-slim
    pull_policy: always
    command: >
      bash -c "
        apt-get update -qq && apt-get install -y --no-install-recommends git ca-certificates &&
        pip install --no-cache-dir uv &&
        git clone https://github.com/7ang0n1n3/weatherglass.git /wgapp &&
        cd /wgapp && uv sync --frozen &&
        uv run python app.py
      "
    ports:
      - "5099:5099"
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      UV_PROJECT_ENVIRONMENT: "/wgapp/.venv"
    volumes:
      - quote_cache:/wgapp/.cache_quotes

volumes:
  quote_cache:
